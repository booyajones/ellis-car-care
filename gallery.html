<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>In action, Elion Car Care</title>
  <meta name="description" content="Before and after photos from recent Elion Car Care details around Burns Park, Ann Arbor.">
  <meta name="theme-color" content="#2A2D33">
  <meta name="color-scheme" content="dark">
  <link rel="canonical" href="https://elioncarcare.com/gallery">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles.css?v=17">
  <link rel="stylesheet" href="chatbot.css?v=3">
  <link rel="stylesheet" href="nav.css?v=2">
</head>
<body>

<header class="topbar" data-shared-nav></header>

<main class="gallery-page">
  <div class="container">
    <header class="section-head">
      <p class="eyebrow">In the wild</p>
      <h1 class="display">Cars from your block.</h1>
      <hr class="stripe-rule" aria-hidden="true">
      <p style="max-width:640px;color:var(--ink-soft);font-size:1.05rem;">
        Real driveways. Real foam. Two-bucket method, by hand, every panel. If you want your car added, just say so when you book.
      </p>
    </header>

    <div class="gallery-grid" data-gallery-wash>
      <!-- Wash process photos. Populated by gallery.js from images/process/wash-NN-*. -->
    </div>

    <section class="gallery-jobs-section" data-gallery-jobs-section>
      <header class="section-head" style="margin-top:var(--s-9);">
        <p class="eyebrow">Before and after</p>
        <h2 class="display">Receipts.</h2>
        <hr class="stripe-rule" aria-hidden="true">
        <p style="max-width:640px;color:var(--ink-soft);font-size:1.05rem;">
          Side-by-sides from completed jobs. The proof.
        </p>
      </header>
      <div class="gallery-grid" data-gallery-jobs>
        <!-- Before/after job pairs. Populated by gallery.js from images/jobs/. -->
      </div>
    </section>
  </div>
</main>

<footer class="site-footer" data-shared-footer></footer>

<script src="config.js?v=16"></script>
<script src="nav.js?v=2" defer></script>
<script src="chatbot.js?v=10" defer></script>
<script src="gallery.js?v=2" defer></script>
</body>
</html>
