<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2A2D33"/>
  <!-- Bold "e" wordmark in cream -->
  <text x="32" y="42" font-family="Inter, system-ui, sans-serif" font-weight="800"
        font-size="36" letter-spacing="-1" fill="#F4ECD8" text-anchor="middle">e</text>
  <!-- Four-stripe accent under the e -->
  <rect x="14" y="50" width="36" height="2.5" fill="#D94436"/>
  <rect x="14" y="53" width="36" height="2.5" fill="#E89B3A"/>
  <rect x="14" y="56" width="36" height="2.5" fill="#E4CB42"/>
  <rect x="14" y="59" width="36" height="2.5" fill="#3CB286"/>
</svg>
