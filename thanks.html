<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Got it. Thanks. Elion Car Care</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="styles.css?v=23">
</head>
<body class="page-404">
  <div class="site-stripe-top" aria-hidden="true"></div>
  <main class="container" style="padding-top: 8rem; text-align: center; min-height: 80vh;">
    <p class="eyebrow" style="display:block; margin-bottom: 1.5rem;">SENT</p>
    <h1 class="display" style="margin-bottom: 1.25rem;">Got it. Ellis will text you back.</h1>
    <hr class="stripe-rule" aria-hidden="true" style="margin: 1.5rem auto 2rem;">
    <p class="lead" style="margin-inline:auto; margin-bottom: 2rem;">
      Usually inside an hour. If it's been a while, give him a nudge.
    </p>
    <p style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
      <a href="tel:+16282520740" data-tel-link class="btn btn-ghost"><span data-tel-display>(628) 252-0740</span></a>
      <a href="/" class="btn btn-primary btn-lg">Back to pricing</a>
    </p>
    <p class="muted small" style="margin-top:3rem;">
      Tell a neighbor. You both get $10 off when they book.
    </p>
  </main>

  <footer class="site-footer" data-shared-footer></footer>
  <script src="nav.js?v=2" defer></script>
  <script src="config.js"></script>
  <script>
    (function () {
      const c = window.CONFIG;
      if (!c) return;
      document.querySelectorAll("[data-tel-link]").forEach(a => a.setAttribute("href", "tel:" + c.contact.phoneHref));
      document.querySelectorAll("[data-tel-display]").forEach(a => a.textContent = c.contact.phone);
    })();
  </script>
</body>
</html>
