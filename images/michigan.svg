<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 290" fill="none" stroke="#0E2A47" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!--
    Lower Peninsula of Michigan.
    Tall body with a clear thumb sticking up-east on the right side.
    Saginaw Bay carves the inner curve between the thumb base and the body.
    Path travels clockwise from top-left.
  -->
  <path d="
    M 62 30
    L 138 30
    Q 150 30 150 44
    L 150 64
    Q 142 78 128 90
    Q 116 102 122 114
    Q 134 122 150 110
    Q 158 92 166 70
    Q 176 50 188 56
    Q 198 70 196 88
    Q 192 102 178 106
    Q 164 110 156 116
    Q 152 122 152 132
    L 158 256
    Q 158 268 144 268
    L 60 268
    Q 40 268 38 256
    L 32 198
    Q 26 138 30 92
    Q 34 60 44 44
    Q 52 30 62 30 Z
  " fill="#FAF4E8" stroke="#0E2A47"/>

  <!-- Saginaw Bay water hint -->
  <path d="M124 92 Q134 100 146 96" opacity=".55" stroke="#2FA9B8" stroke-width="1.8" fill="none"/>
  <path d="M126 102 Q138 110 150 104" opacity=".4" stroke="#2FA9B8" stroke-width="1.5" fill="none"/>

  <!-- Lake Michigan hint along west coast -->
  <path d="M28 124 Q22 160 28 196" opacity=".35"/>

  <!-- Ann Arbor pin (south-central, in the lower body of the LP) -->
  <circle cx="92" cy="220" r="7" fill="#F5B83A" stroke="#0E2A47" stroke-width="2.2"/>
  <circle cx="92" cy="220" r="2.2" fill="#0E2A47" stroke="none"/>
  <text x="106" y="225" font-family="Georgia, serif" font-size="13" font-weight="600" fill="#0E2A47" stroke="none">Ann Arbor</text>
</svg>
